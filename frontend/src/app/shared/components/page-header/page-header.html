<header class="page-header">
  <div>
    <p class="eyebrow">{{ eyebrow() }}</p>
    <h2>{{ title() }}</h2>
    <p class="description">{{ description() }}</p>
  </div>
  @if (actionLabel(); as actionLabel) {
    <button mat-flat-button color="primary" (click)="action.emit()">
      <mat-icon>add</mat-icon>
      {{ actionLabel }}
    </button>
  }
</header>
